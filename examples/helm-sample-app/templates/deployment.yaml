apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sample-app.fullname" . | default "sample-app" }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 80
