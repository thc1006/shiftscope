{{- if eq .Values.mode "job" }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-scan
  labels:
    app.kubernetes.io/name: shiftscope
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
        - name: shiftscope
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              shiftscope analyze {{ .Values.job.analyzer }} {{ .Values.job.inputPath }} --output json > /tmp/results.json
{{ if ne .Values.job.outputFormat "json" }}
              shiftscope analyze {{ .Values.job.analyzer }} {{ .Values.job.inputPath }} --output {{ .Values.job.outputFormat }}
{{ else }}
              cat /tmp/results.json
{{ end }}
{{ if .Values.job.failOnCritical }}
              CRITICAL="$(python3 -c 'import json; d=json.load(open("/tmp/results.json")); print(len([f for f in d.get("findings",[]) if f.get("severity")=="critical"]))')"
              if [ "$CRITICAL" -gt 0 ]; then echo "CRITICAL findings detected"; exit 1; fi
{{ end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      restartPolicy: Never
  backoffLimit: 2
{{- end }}
