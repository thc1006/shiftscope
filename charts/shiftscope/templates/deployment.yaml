{{- if eq .Values.mode "server" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mcp
  labels:
    app.kubernetes.io/name: shiftscope
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.server.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: shiftscope
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: shiftscope
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name | default (printf "%s-shiftscope" .Release.Name) }}
      containers:
        - name: shiftscope
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - shiftscope
            - mcp-serve
            {{- if eq .Values.server.transport "http" }}
            - --http
            - --host
            - "0.0.0.0"
            - --port
            - "{{ .Values.server.port }}"
            {{- else }}
            - --stdio
            {{- end }}
          {{- if eq .Values.server.transport "http" }}
          ports:
            - containerPort: {{ .Values.server.port }}
              protocol: TCP
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
{{- end }}
